<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فراموشی رمز عبور | سیستم پایش مالی</title>
    <link
      href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="stylesheet" href="/assets/css/forgot-password.css" />
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <!-- لوگو -->
        <div class="logo">پایش<span>مالی</span></div>

        <!-- عناوین -->
        <h2>فراموشی رمز عبور</h2>
        <p class="subtitle">
          ایمیل خود را وارد کنید تا لینک بازیابی رمز عبور برای شما ارسال شود.
        </p>

        <!-- فرم دریافت ایمیل -->
        <form action="#" method="POST">
          <div class="input-group">
            <label for="email">پست الکترونیک</label>
            <input
              type="email"
              id="email"
              placeholder="example@mail.com"
              required
            />
          </div>

          <button type="submit" class="btn-primary">ارسال لینک بازیابی</button>
        </form>

        <!-- لینک بازگشت -->
        <div class="auth-footer">
          <p>
            رمز عبور خود را به یاد آوردید؟
            <a href="login.html">ورود به سیستم</a>
          </p>
        </div>
      </div>
    </div>
    <script src="/assets/js/forgot-password.js"></script>
  </body>
</html>
