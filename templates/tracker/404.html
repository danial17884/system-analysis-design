<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحه پیدا نشد | آوندسنتر</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v18.0.0/dist/font-face.css">

    <style>
        :root {
            --bg-dark: #0f0f0f;
            --text-primary: #ffffff;
            --text-muted: #a0a0a0;
            --primary: #ff7b00;
            --primary-hover: #e06a00;
            --glow-color: rgba(255, 122, 0, 0.15);
            --logo-gradient: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
        }

        body.light-mode {
            --bg-dark: #f5f5f7;
            --text-primary: #1d1d1f;
            --text-muted: #6e6e73;
            --glow-color: rgba(255, 122, 0, 0.08);
            --logo-gradient: linear-gradient(135deg, #1d1d1f 0%, #4a4a4f 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* جلوگیری از اسکرول */
        }

        body {
            font-family: 'Vazir', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: none;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 50%;
            transition: all 0.3s ease;
            line-height: 1;
            color: var(--text-primary);
            z-index: 10;
        }

        .theme-toggle:hover {
            background: rgba(128,128,128,0.15);
            transform: rotate(20deg);
        }

        .logo-link {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.5rem;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-fill-color: transparent;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .logo-link:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .background-glow {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulseGlow 4s infinite alternate;
            pointer-events: none; /* عدم تأثیر بر اسکرول یا کلیک */
        }

        .error-page-container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
        }

        .flicker-text {
            font-size: 8rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 30px rgba(255,122,0,0.3);
            animation: flicker 3s infinite;
        }

        .error-content h2 {
            font-size: 2rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .error-content p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .btn-orange {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            background-color: var(--primary);
            color: #ffffff;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-size: 1.05rem;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 122, 0, 0.4);
            border: none;
            cursor: pointer;
        }

        .btn-orange:hover {
            background-color: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 122, 0, 0.5);
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                opacity: 1;
                text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary), 0 0 30px rgba(255,122,0,0.4);
            }
            20%, 24%, 55% {
                opacity: 0.4;
                text-shadow: none;
            }
            21%, 56% {
                opacity: 0.1;
                text-shadow: none;
            }
            23% {
                opacity: 0.8;
                text-shadow: 0 0 5px var(--primary);
            }
        }

        @keyframes pulseGlow {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.6;
            }
            100% {
                transform: translate(-50%, -50%) scale(1.5);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .flicker-text {
                font-size: 6rem;
            }
            .error-content h2 {
                font-size: 1.6rem;
            }
            .btn-orange {
                padding: 0.7rem 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .flicker-text {
                font-size: 4.5rem;
                letter-spacing: 2px;
            }
            .error-content h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="theme-toggle" title="تغییر تم">🌙</button>
    <a href="index.html" class="logo-link">آوندسنتر</a>
    <div class="background-glow"></div>
    <div class="error-page-container">
        <div class="error-content">
            <h1 class="flicker-text">404</h1>
            <h2>مسیر را گم کرده‌اید!</h2>
            <p>متأسفانه صفحه‌ای که به دنبال آن هستید در آوندسنتر پیدا نشد. ممکن است حذف شده باشد یا آدرس را اشتباه وارد کرده باشید.</p>
            <a href="{% url 'dashboard' %}" class="btn-orange">بازگشت به داشبورد</a>
        </div>
    </div>

    <script>
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            const savedTheme = localStorage.getItem('theme');

            function setTheme(theme) {
                if (theme === 'light') {
                    body.classList.add('light-mode');
                    themeToggle.textContent = '☀️';
                } else {
                    body.classList.remove('light-mode');
                    themeToggle.textContent = '🌙';
                }
            }

            if (savedTheme === 'light') setTheme('light'); else setTheme('dark');

            themeToggle.addEventListener('click', () => {
                if (body.classList.contains('light-mode')) {
                    setTheme('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    setTheme('light');
                    localStorage.setItem('theme', 'light');
                }
            });
        })();
    </script>
</body>
</html>
