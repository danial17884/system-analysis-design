<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبات اقتصاد مهندسی | آوندسنتر</title>
    
    <!-- Bootstrap 5 RTL CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
    
    <!-- Vazirmatn Font -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --muted: #a0a0a0;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --border: #333;
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(128, 128, 128, 0.12);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --logo-gradient: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            --toggle-bg: #2a2a2a;
            --toggle-active: rgba(255, 122, 0, 0.2);
            --fieldset-bg: rgba(255, 255, 255, 0.02);
            --fieldset-border: rgba(255, 255, 255, 0.1);
        }

        body.light-mode {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --border: #e0e0e0;
            --card-bg: rgba(255, 255, 255, 0.7);
            --input-bg: rgba(0, 0, 0, 0.05);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --logo-gradient: linear-gradient(135deg, #1d1d1f 0%, #4a4a4f 100%);
            --toggle-bg: #f0f0f0;
            --fieldset-bg: rgba(0, 0, 0, 0.02);
            --fieldset-border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.7s ease, color 0.7s ease;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* دکمه تغییر تم */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s;
            padding-bottom: 3px;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* لوگو */
        .logo-link {
            position: fixed;
            top: 1.7rem;
            right: 1.7rem;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .logo-link:hover {
            opacity: 0.8;
        }

        /* کانتینر اصلی */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* هدر صفحه */
        .page-header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s;
        }

        .back-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* فرم کانتینر */
        .form-container {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 35px 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-top: 40px;
            margin-bottom: 50px;
        }

        /* ردیف‌های فرم */
        .form-row {
            margin-bottom: 25px;
            align-items: center;
        }

        .form-label {
            font-weight: 600;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 8px;
            padding-right: 0;
        }

        /* اینپوت‌ها و سلکت‌ها */
        .input-wrapper {
            max-width: 400px;
            margin-right: auto;
        }

        .form-control, .form-select {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: border-color 0.3s, box-shadow 0.3s;
            direction: ltr;
            text-align: left;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.15);
            background-color: var(--input-bg);
            color: #1d1717;
        }

        .form-control::placeholder {
            color: var(--muted);
        }

        /* فیلدست پارامترهای تکمیلی */
        .custom-fieldset {
            border: 1px solid var(--fieldset-border);
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
            position: relative;
            background-color: var(--fieldset-bg);
        }

        .custom-legend {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            width: auto;
            padding: 0 12px;
            margin-bottom: 0;
            float: none;
            background-color: var(--surface);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .helper-text {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 6px;
            line-height: 1.5;
        }

        /* جداکننده */
        .divider {
            border-top: 1px solid var(--border);
            margin: 35px 0;
        }

        /* دکمه محاسبه */
        .btn-calculate {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-calculate:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        .btn-calculate:active {
            transform: scale(0.98);
        }

        /* بخش نتایج */
        .results-section {
            margin-top: 40px;
            padding: 25px;
            background-color: var(--fieldset-bg);
            border-radius: 12px;
            border: 1px solid var(--fieldset-border);
            display: none;
        }

        .results-section h4 {
            color: var(--text);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--fieldset-border);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .result-value {
            color: var(--text);
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* واکنش‌گرایی */
        @media (max-width: 768px) {
            .form-container {
                padding: 25px 20px;
                border-radius: 16px;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .input-wrapper {
                max-width: 100%;
            }
            
            .custom-fieldset {
                padding: 20px 15px;
            }
            
            .theme-toggle,
            .logo-link {
                top: 1rem;
            }
            .theme-toggle {
                left: 1rem;
            }
            .logo-link {
                right: 1rem;
                font-size: 1.4rem;
            }
        }

        @media (max-width: 576px) {
            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .form-label {
                margin-bottom: 10px;
            }
            
            .btn-calculate {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- دکمه تغییر تم -->
    <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">🌙</button>

    <!-- لینک به صفحه اصلی -->
    <a href="index.html" class="logo-link">آوندسنتر</a>

    <div class="main-container">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8">
                
                <div class="form-container">
                    <!-- هدر صفحه -->
                    <div class="page-header">
                        <h2>محاسبات اقتصاد مهندسی</h2>
                        <a href="index.html" class="back-link">
                            <i class="fas fa-arrow-right"></i>
                            بازگشت به صفحه اصلی
                        </a>
                    </div>

                    <!-- فرم محاسبات -->
                    <form id="calcForm">
                        
                        <!-- نوع محاسبه -->
                        <div class="row form-row">
                            <label for="calcType" class="col-md-4 col-form-label form-label">نوع محاسبه:</label>
                            <div class="col-md-8">
                                <div class="input-wrapper">
                                    <select class="form-select" id="calcType">
                                        <option value="1" selected>1. ارزش آینده (F) با داشتن ارزش فعلی (P)</option>
                                        <option value="2">2. ارزش فعلی (P) با داشتن ارزش آینده (F)</option>
                                        <option value="3">3. ارزش آینده (F) با داشتن پرداخت یکنواخت (A)</option>
                                        <option value="4">4. پرداخت یکنواخت (A) با داشتن ارزش آینده (F)</option>
                                        <option value="5">5. ارزش فعلی (P) با داشتن پرداخت یکنواخت (A)</option>
                                        <option value="6">6. پرداخت یکنواخت (A) با داشتن ارزش فعلی (P)</option>
                                        <option value="7">7. ارزش آینده (F) با داشتن گرادیان حسابی (G)</option>
                                        <option value="8">8. ارزش فعلی (P) با داشتن گرادیان حسابی (G)</option>
                                        <option value="9">9. ارزش فعلی (P) با داشتن گرادیان هندسی (g)</option>
                                        <option value="10">10. نرخ بهره مؤثر (i_eff) با نرخ اسمی (i_nom)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- مبلغ -->
                        <div class="row form-row">
                            <label for="amountValue" class="col-md-4 col-form-label form-label">مبلغ (مقدار P, F, A, G یا مقدار پایه A1):</label>
                            <div class="col-md-8">
                                <div class="input-wrapper">
                                    <input type="number" class="form-control text-end" id="amountValue" value="0" step="0.01">
                                </div>
                            </div>
                        </div>

                        <!-- نرخ بهره -->
                        <div class="row form-row">
                            <label for="interestRate" class="col-md-4 col-form-label form-label">نرخ بهره (درصد - i):</label>
                            <div class="col-md-8">
                                <div class="input-wrapper">
                                    <input type="number" step="0.01" class="form-control text-end" id="interestRate" value="0">
                                </div>
                            </div>
                        </div>

                        <!-- تعداد دوره ها -->
                        <div class="row form-row">
                            <label for="periods" class="col-md-4 col-form-label form-label">تعداد دوره‌ها (n):</label>
                            <div class="col-md-8">
                                <div class="input-wrapper">
                                    <input type="number" class="form-control text-end" id="periods" value="1" min="1">
                                </div>
                            </div>
                        </div>

                        <!-- پارامترهای تکمیلی (فیلدست) -->
                        <fieldset class="custom-fieldset">
                            <legend class="custom-legend">پارامترهای تکمیلی (در صورت نیاز)</legend>
                            
                            <!-- نرخ گرادیان -->
                            <div class="row mb-3 align-items-start mt-2">
                                <div class="col-md-4">
                                    <label for="gradientRate" class="col-form-label form-label mb-0 pb-0">نرخ گرادیان هندسی (درصد - g):</label>
                                    <div class="helper-text">* فقط برای فرمول شماره 9</div>
                                </div>
                                <div class="col-md-8">
                                    <div class="input-wrapper mt-2 mt-md-0">
                                        <input type="number" step="0.01" class="form-control text-end" id="gradientRate" value="0">
                                    </div>
                                </div>
                            </div>

                            <!-- دفعات ترکیب در سال -->
                            <div class="row mb-2 align-items-start">
                                <div class="col-md-4">
                                    <label for="compoundFreq" class="col-form-label form-label mb-0 pb-0">دفعات ترکیب در سال (m):</label>
                                    <div class="helper-text">* فقط برای فرمول شماره 10 (مثلاً 12 برای ماهانه)</div>
                                </div>
                                <div class="col-md-8">
                                    <div class="input-wrapper mt-2 mt-md-0">
                                        <input type="number" class="form-control text-end" id="compoundFreq" value="1" min="1">
                                    </div>
                                </div>
                            </div>
                        </fieldset>

                        <div class="divider"></div>

                        <!-- دکمه محاسبه -->
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn-calculate">
                                <i class="fas fa-calculator"></i>
                                محاسبه
                            </button>
                        </div>

                        <!-- بخش نتایج -->
                        <div class="results-section" id="resultsSection">
                            <h4>نتایج محاسبات</h4>
                            <div class="result-item">
                                <span class="result-label">نوع محاسبه:</span>
                                <span class="result-value" id="resultType">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">مقدار ورودی:</span>
                                <span class="result-value" id="resultInput">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">نرخ بهره:</span>
                                <span class="result-value" id="resultInterest">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">تعداد دوره‌ها:</span>
                                <span class="result-value" id="resultPeriods">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">نتیجه:</span>
                                <span class="result-value" id="resultOutput">-</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">فرمول استفاده شده:</span>
                                <span class="result-value" id="resultFormula">-</span>
                            </div>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // مدیریت تم تیره/روشن
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        const setThemeIcon = (theme) => {
            themeToggle.textContent = theme === 'light' ? '☀️' : '🌙';
        };
        const applyTheme = (theme) => {
            if (theme === 'light') {
                body.classList.add('light-mode');
                setThemeIcon('light');
            } else {
                body.classList.remove('light-mode');
                setThemeIcon('dark');
            }
        };
        applyTheme(savedTheme === 'light' ? 'light' : 'dark');
        themeToggle.addEventListener('click', () => {
            const isLight = body.classList.contains('light-mode');
            const newTheme = isLight ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // فرم محاسبات
        const calcForm = document.getElementById('calcForm');
        const calcType = document.getElementById('calcType');
        const amountValue = document.getElementById('amountValue');
        const interestRate = document.getElementById('interestRate');
        const periods = document.getElementById('periods');
        const gradientRate = document.getElementById('gradientRate');
        const compoundFreq = document.getElementById('compoundFreq');
        const resultsSection = document.getElementById('resultsSection');
        
        // عناصر نتایج
        const resultType = document.getElementById('resultType');
        const resultInput = document.getElementById('resultInput');
        const resultInterest = document.getElementById('resultInterest');
        const resultPeriods = document.getElementById('resultPeriods');
        const resultOutput = document.getElementById('resultOutput');
        const resultFormula = document.getElementById('resultFormula');

        // توابع محاسباتی
        const calculateFutureValueFromPresent = (P, i, n) => {
            // F = P * (1 + i)^n
            const iDecimal = i / 100;
            return P * Math.pow(1 + iDecimal, n);
        };

        const calculatePresentValueFromFuture = (F, i, n) => {
            // P = F / (1 + i)^n
            const iDecimal = i / 100;
            return F / Math.pow(1 + iDecimal, n);
        };

        const calculateFutureValueFromAnnuity = (A, i, n) => {
            // F = A * [((1 + i)^n - 1) / i]
            const iDecimal = i / 100;
            if (iDecimal === 0) return A * n;
            return A * (Math.pow(1 + iDecimal, n) - 1) / iDecimal;
        };

        const calculateAnnuityFromFutureValue = (F, i, n) => {
            // A = F * [i / ((1 + i)^n - 1)]
            const iDecimal = i / 100;
            if (iDecimal === 0) return F / n;
            return F * iDecimal / (Math.pow(1 + iDecimal, n) - 1);
        };

        const calculatePresentValueFromAnnuity = (A, i, n) => {
            // P = A * [(1 - (1 + i)^-n) / i]
            const iDecimal = i / 100;
            if (iDecimal === 0) return A * n;
            return A * (1 - Math.pow(1 + iDecimal, -n)) / iDecimal;
        };

        const calculateAnnuityFromPresentValue = (P, i, n) => {
            // A = P * [i / (1 - (1 + i)^-n)]
            const iDecimal = i / 100;
            if (iDecimal === 0) return P / n;
            return P * iDecimal / (1 - Math.pow(1 + iDecimal, -n));
        };

        const calculateFutureValueFromArithmeticGradient = (G, i, n) => {
            // F = G * [((1 + i)^n - i*n - 1) / i^2]
            const iDecimal = i / 100;
            if (iDecimal === 0) return G * n * (n - 1) / 2;
            const numerator = Math.pow(1 + iDecimal, n) - iDecimal * n - 1;
            return G * numerator / Math.pow(iDecimal, 2);
        };

        const calculatePresentValueFromArithmeticGradient = (G, i, n) => {
            // P = G * [((1 + i)^n - i*n - 1) / (i^2 * (1 + i)^n)]
            const iDecimal = i / 100;
            if (iDecimal === 0) return G * n * (n - 1) / 2;
            const numerator = Math.pow(1 + iDecimal, n) - iDecimal * n - 1;
            const denominator = Math.pow(iDecimal, 2) * Math.pow(1 + iDecimal, n);
            return G * numerator / denominator;
        };

        const calculatePresentValueFromGeometricGradient = (A1, i, g, n) => {
            // P = A1 * [1 - ((1 + g)/(1 + i))^n] / (i - g)  اگر i ≠ g
            // P = A1 * n / (1 + i)  اگر i = g
            const iDecimal = i / 100;
            const gDecimal = g / 100;
            
            if (iDecimal === gDecimal) {
                return A1 * n / (1 + iDecimal);
            } else {
                const ratio = (1 + gDecimal) / (1 + iDecimal);
                return A1 * (1 - Math.pow(ratio, n)) / (iDecimal - gDecimal);
            }
        };

        const calculateEffectiveInterestRate = (i_nom, m) => {
            // i_eff = (1 + i_nom/m)^m - 1
            const i_nomDecimal = i_nom / 100;
            return (Math.pow(1 + i_nomDecimal / m, m) - 1) * 100;
        };

        // مدیریت تغییر نوع محاسبه
        calcType.addEventListener('change', function() {
            const selectedValue = parseInt(this.value);
            
            // تنظیم placeholder بر اساس نوع محاسبه
            switch(selectedValue) {
                case 1: // F از P
                    amountValue.placeholder = "مقدار P (ارزش فعلی)";
                    break;
                case 2: // P از F
                    amountValue.placeholder = "مقدار F (ارزش آینده)";
                    break;
                case 3: // F از A
                    amountValue.placeholder = "مقدار A (پرداخت یکنواخت)";
                    break;
                case 4: // A از F
                    amountValue.placeholder = "مقدار F (ارزش آینده)";
                    break;
                case 5: // P از A
                    amountValue.placeholder = "مقدار A (پرداخت یکنواخت)";
                    break;
                case 6: // A از P
                    amountValue.placeholder = "مقدار P (ارزش فعلی)";
                    break;
                case 7: // F از G
                    amountValue.placeholder = "مقدار G (گرادیان حسابی)";
                    break;
                case 8: // P از G
                    amountValue.placeholder = "مقدار G (گرادیان حسابی)";
                    break;
                case 9: // P از گرادیان هندسی
                    amountValue.placeholder = "مقدار A1 (پایه گرادیان هندسی)";
                    break;
                case 10: // نرخ مؤثر
                    amountValue.placeholder = "نرخ بهره اسمی (i_nom)";
                    break;
                default:
                    amountValue.placeholder = "مقدار ورودی";
            }
        });

        // اجرای اولیه
        calcType.dispatchEvent(new Event('change'));

        // ارسال فرم
        calcForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const selectedCalc = parseInt(calcType.value);
            const amount = parseFloat(amountValue.value) || 0;
            const interest = parseFloat(interestRate.value) || 0;
            const n = parseInt(periods.value) || 1;
            const g = parseFloat(gradientRate.value) || 0;
            const m = parseInt(compoundFreq.value) || 1;
            
            let result = 0;
            let formula = "";
            let calcName = calcType.options[calcType.selectedIndex].text;
            
            // محاسبه بر اساس نوع انتخاب شده
            switch(selectedCalc) {
                case 1: // F از P
                    result = calculateFutureValueFromPresent(amount, interest, n);
                    formula = "F = P × (1 + i)^n";
                    break;
                case 2: // P از F
                    result = calculatePresentValueFromFuture(amount, interest, n);
                    formula = "P = F ÷ (1 + i)^n";
                    break;
                case 3: // F از A
                    result = calculateFutureValueFromAnnuity(amount, interest, n);
                    formula = "F = A × [((1 + i)^n - 1) ÷ i]";
                    break;
                case 4: // A از F
                    result = calculateAnnuityFromFutureValue(amount, interest, n);
                    formula = "A = F × [i ÷ ((1 + i)^n - 1)]";
                    break;
                case 5: // P از A
                    result = calculatePresentValueFromAnnuity(amount, interest, n);
                    formula = "P = A × [(1 - (1 + i)^-n) ÷ i]";
                    break;
                case 6: // A از P
                    result = calculateAnnuityFromPresentValue(amount, interest, n);
                    formula = "A = P × [i ÷ (1 - (1 + i)^-n)]";
                    break;
                case 7: // F از G
                    result = calculateFutureValueFromArithmeticGradient(amount, interest, n);
                    formula = "F = G × [((1 + i)^n - i×n - 1) ÷ i²]";
                    break;
                case 8: // P از G
                    result = calculatePresentValueFromArithmeticGradient(amount, interest, n);
                    formula = "P = G × [((1 + i)^n - i×n - 1) ÷ (i² × (1 + i)^n)]";
                    break;
                case 9: // P از گرادیان هندسی
                    result = calculatePresentValueFromGeometricGradient(amount, interest, g, n);
                    formula = "P = A1 × [1 - ((1+g)/(1+i))^n] ÷ (i - g)";
                    break;
                case 10: // نرخ مؤثر
                    result = calculateEffectiveInterestRate(amount, m);
                    formula = "i_eff = (1 + i_nom/m)^m - 1";
                    break;
                default:
                    result = 0;
                    formula = "فرمول نامشخص";
            }
            
            // نمایش نتایج
            resultType.textContent = calcName;
            resultInput.textContent = amount.toLocaleString('fa-IR') + (selectedCalc === 10 ? "%" : "");
            resultInterest.textContent = interest + "%";
            resultPeriods.textContent = n;
            resultOutput.textContent = result.toFixed(2).toLocaleString('fa-IR') + (selectedCalc === 10 ? "%" : "");
            resultFormula.textContent = formula;
            
            // نمایش بخش نتایج
            resultsSection.style.display = 'block';
            
            // اسکرول به نتایج
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        // بارگذاری تم ذخیره شده
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                body.classList.add('light-mode');
                themeToggle.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
