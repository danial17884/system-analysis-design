<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ورود | سیستم پایش مالی</title>
    <link rel="stylesheet" href="/assets/css/login.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="logo">پایش<span>مالی</span></div>
        <h2>خوش آمدید!</h2>
        <p class="subtitle">
          لطفاً برای ورود به پنل کاربری، اطلاعات خود را وارد کنید.
        </p>

        <form action="#">
          <div class="input-group">
            <label for="email">آدرس ایمیل</label>
            <input
              type="email"
              id="email"
              placeholder="example@mail.com"
              required
              dir="ltr"
            />
          </div>

          <div class="input-group">
            <label for="password">رمز عبور</label>
            <input
              type="password"
              id="password"
              placeholder="********"
              required
              dir="ltr"
            />
          </div>

          <div class="form-actions">
            <label class="remember-me">
              <input type="checkbox" /> مرا به خاطر بسپار
            </label>
            <a href="#" class="forgot-password">رمز عبور را فراموش کرده‌اید؟</a>
          </div>

          <button type="submit" class="btn-submit">ورود به حساب</button>
        </form>

        <p class="signup-link">
          حساب کاربری ندارید؟ <a href="signup.html">ثبت‌نام کنید</a>
        </p>
      </div>
    </div>
    <script src="/assets/js/login.js"></script>
  </body>
</html>
