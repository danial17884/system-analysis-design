<!doctype html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>فراموشی رمز عبور | آوندسنتر</title>

    <!-- فونت وزیر -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v18.0.0/dist/font-face.css" />

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --muted: #a0a0a0;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --border: #333;
            --card-bg: rgba(255, 255, 255, 0.03);
            --logo-gradient: linear-gradient(135deg, #ffffff 0%, #cccccc 100%);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            --toggle-bg: #2a2a2a;
            --toggle-active: rgba(255, 122, 0, 0.2);
        }

        body.light-mode {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --primary: #ff7a00;
            --primary-hover: #e06b00;
            --border: #e0e0e0;
            --card-bg: rgba(255, 255, 255, 0.7);
            --logo-gradient: linear-gradient(135deg, #1d1d1f 0%, #4a4a4f 100%);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --toggle-bg: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazir', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.7s ease, color 0.7s ease;
            position: relative;
            overflow-x: hidden;
        }

        .page-container {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* دکمه تغییر تم */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        /* لوگوی آوندسنتر */
        .logo-link {
            position: fixed;
            top: 1.7rem;
            right: 1.7rem;
            text-decoration: none;
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--logo-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .logo-link:hover {
            opacity: 0.8;
        }

        /* کارت اصلی فرم */
        .auth-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 440px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            text-align: center;
            margin-top: 60px;
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            color: var(--text);
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        /* انتخاب روش بازیابی */
        .recovery-method {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--toggle-bg);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .recovery-method input[type="radio"] {
            display: none;
        }

        .recovery-method label {
            display: block;
            padding: 10px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--muted);
            transition: all 0.3s;
            user-select: none;
        }

        .recovery-method input[type="radio"]:checked + label {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 10px rgba(255, 122, 0, 0.3);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--muted);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background-color: rgba(128, 128, 128, 0.1);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            direction: ltr;
            text-align: left;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.2);
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 122, 0, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .auth-footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* مخفی‌سازی فیلدها بر اساس انتخاب */
        #phoneGroup {
            display: none;
        }

        /* واکنش‌گرایی */
        @media (max-width: 480px) {
            .auth-card {
                padding: 30px 20px;
                border-radius: 16px;
            }

            .theme-toggle,
            .logo-link {
                top: 1rem;
            }

            .theme-toggle {
                left: 1rem;
            }
            .logo-link {
                right: 1rem;
                font-size: 1.4rem;
            }

            .recovery-method {
                width: 100%;
            }
            .recovery-method label {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- دکمه تغییر تم -->
    <button class="theme-toggle" id="themeToggle" aria-label="تغییر تم">
        🌙
    </button>

    <!-- لینک به صفحه اصلی -->
    <a href="index.html" class="logo-link">آوندسنتر</a>

    <div class="page-container">
        <div class="auth-card">
            <h2>فراموشی رمز عبور</h2>
            <p class="subtitle">
                برای بازیابی رمز عبور خود، یکی از روش‌های زیر را انتخاب و اطلاعات خواسته شده را وارد کنید.
            </p>

            <form id="recoveryForm">
                <!-- انتخاب روش بازیابی -->
                <div class="recovery-method">
                    <input type="radio" name="recoveryMethod" id="method-email" value="email" checked>
                    <label for="method-email">ایمیل</label>

                    <input type="radio" name="recoveryMethod" id="method-phone" value="phone">
                    <label for="method-phone">شماره تلفن</label>
                </div>

                <!-- فیلد ایمیل -->
                <div class="input-group" id="emailGroup">
                    <label for="email">پست الکترونیک</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="example@mail.com"
                        required
                    />
                </div>

                <!-- فیلد شماره تلفن -->
                <div class="input-group" id="phoneGroup">
                    <label for="phone">شماره تلفن همراه</label>
                    <input
                        type="tel"
                        id="phone"
                        placeholder="09123456789"
                        required
                    />
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    ارسال لینک بازیابی
                </button>
            </form>

            <div class="auth-footer">
                <p>
                    رمز عبور خود را به یاد آوردید؟
                    <a href="{% url 'login' %}">ورود به سیستم</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // مدیریت تم تیره/روشن
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        function setThemeIcon(theme) {
            themeToggle.textContent = theme === 'light' ? '☀️' : '🌙';
        }
        function applyTheme(theme) {
            if (theme === 'light') {
                body.classList.add('light-mode');
                setThemeIcon('light');
            } else {
                body.classList.remove('light-mode');
                setThemeIcon('dark');
            }
        }
        applyTheme(savedTheme === 'light' ? 'light' : 'dark');
        themeToggle.addEventListener('click', () => {
            const isLight = body.classList.contains('light-mode');
            const newTheme = isLight ? 'dark' : 'light';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        });

        // مدیریت نمایش فیلدها بر اساس روش انتخابی
        const emailRadio = document.getElementById('method-email');
        const phoneRadio = document.getElementById('method-phone');
        const emailGroup = document.getElementById('emailGroup');
        const phoneGroup = document.getElementById('phoneGroup');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const submitBtn = document.getElementById('submitBtn');
        const form = document.getElementById('recoveryForm');

        function toggleFields() {
            if (emailRadio.checked) {
                emailGroup.style.display = 'block';
                phoneGroup.style.display = 'none';
                emailInput.required = true;
                phoneInput.required = false;
                phoneInput.value = ''; // پاکسازی مقدار قبلی
                submitBtn.textContent = 'ارسال لینک بازیابی'; // متن ثابت
            } else {
                emailGroup.style.display = 'none';
                phoneGroup.style.display = 'block';
                phoneInput.required = true;
                emailInput.required = false;
                emailInput.value = '';
                submitBtn.textContent = 'ارسال کد تایید'; // تغییر متن بر اساس روش
            }
        }

        emailRadio.addEventListener('change', toggleFields);
        phoneRadio.addEventListener('change', toggleFields);
        // اجرای اولیه
        toggleFields();

        // پیش‌فرض و اعتبارسنجی ساده (نمایشی)
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            if (emailRadio.checked) {
                const email = emailInput.value.trim();
                if (!email) {
                    alert('لطفاً ایمیل خود را وارد کنید.');
                    return;
                }
                alert(`اگر حسابی با ایمیل ${email} وجود داشته باشد، لینک بازیابی ارسال خواهد شد.`);
            } else {
                const phone = phoneInput.value.trim();
                if (!phone) {
                    alert('لطفاً شماره تلفن خود را وارد کنید.');
                    return;
                }
                alert(`اگر حسابی با شماره ${phone} وجود داشته باشد، کد تایید ارسال خواهد شد.`);
            }
        });
    </script>
</body>
</html>
